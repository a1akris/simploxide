[package]
name = "simploxide-client"
version = "0.10.0"
authors = ["a1akris <alkrivitskiy@pm.me>"]
edition = "2024"
license = "MIT OR Apache-2.0"
exclude = ["screenshots"]

description = "SimpleX-Chat API client"
readme = "README.md"
repository = "https://github.com/a1akris/simploxide"
documentation = "https://docs.rs/simploxide-client"
categories = ["network-programming", "asynchronous", "web-programming::websocket"]
keywords = ["simplex", "chat", "websocket", "client"]

[features]
default = ["cli"]
bon = ["simploxide-api-types/bon"]
cli = ["websocket", "simploxide-ws-core/cli"]
ffi = ["dep:simploxide-ffi-core"]
websocket = ["dep:simploxide-ws-core"]
build-sxcrt = ["ffi", "simploxide-ffi-core/build-sxcrt"]
embed-sqlcipher = ["ffi", "simploxide-ffi-core/embed-sqlcipher"]

[dependencies]
futures.workspace = true
serde_json.workspace = true
serde.workspace = true
tokio.workspace = true

simploxide-ws-core = { version = "0.1.0", path = "../simploxide-ws-core", optional = true }
simploxide-ffi-core = { version = "0.1.0", path = "../simploxide-ffi-core", optional = true }
simploxide-api-types = { version = "0.8.0", path = "../simploxide-api-types" }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread"] }
async-trait = "0.1.89"
pretty_env_logger = "0.5.0"
